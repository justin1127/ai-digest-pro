<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <meta http-equiv="refresh" content="0; url=./2026-03-05.html">
    <title>AI每日情报 | 正在跳转...</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', 'PingFang SC', 'Microsoft YaHei', sans-serif;
            background: linear-gradient(135deg, #0a0a0f 0%, #1a1a2e 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
        }
        .loading {
            text-align: center;
            color: white;
        }
        .loading h1 { 
            font-size: 2.5em; 
            margin-bottom: 15px; 
            background: linear-gradient(90deg, #fff, #f0c674);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
        }
        .loading p { 
            opacity: 0.8; 
            color: #a0a0b0;
        }
        .loading a {
            color: #f0c674;
            text-decoration: none;
        }
        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(240, 198, 116, 0.3);
            border-top-color: #f0c674;
            border-radius: 50%;
            animation: spin 1s linear infinite;
            margin: 20px auto;
        }
        @keyframes spin {
            to { transform: rotate(360deg); }
        }
    </style>
</head>
<body>
    <div class="loading">
        <h1>🤖 AI每日情报</h1>
        <div class="spinner"></div>
        <p>正在跳转到今日最新日报 (2026.03.05)...</p>
        <p style="margin-top: 20px;">如果没有自动跳转，请<a href="./2026-03-05.html">点击这里</a></p>
    </div>
</body>
</html>
